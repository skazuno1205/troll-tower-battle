<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>トロールタワーバトル</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <section class="hud">
      <div class="title-row">
        <div class="title">トロールタワーバトル</div>
        <span id="appVersion" class="badge" aria-label="version">v0.1.0</span>
      </div>

      <div class="stats">
        <div class="card"><span>積んだ数</span><strong id="stackCount">0</strong></div>
        <div class="card"><span>ベスト</span><strong id="bestCount">0</strong></div>
      </div>

      <div class="controls">
        <button id="dropBtn" class="primary">ドロップ</button>
        <button id="restartBtn">やり直し</button>
      </div>
    </section>

    <section class="canvas-wrap">
      <canvas id="game"></canvas>
      <div id="itemOverlay" class="item-overlay">
        <button id="itemBtn" class="item-canvas-btn" disabled>🧲<span id="itemCount" class="item-badge">0</span></button>
        <div class="item-progress-ring-wrap">
          <svg class="item-progress-ring" viewBox="0 0 36 36">
            <circle class="ring-bg" cx="18" cy="18" r="15"/>
            <circle id="itemProgressRing" class="ring-fill" cx="18" cy="18" r="15" stroke-dasharray="0 94.25"/>
          </svg>
        </div>
      </div>
      <div class="canvas-rotate-controls" aria-label="回転操作">
        <button id="rotateLeftCanvasBtn" type="button" aria-label="左回転"><span>↺</span></button>
        <button id="rotateRightCanvasBtn" type="button" aria-label="右回転"><span>↻</span></button>
      </div>
      <div id="overlay" class="overlay show">
        <div class="dialog">
          <h2>準備OK？</h2>
          <p>ランダムなトロール画像を落として、どこまで高く積めるか挑戦！</p>
          <p>落とす前は左右移動に加えて回転もできます。ゲーム画面を押して、離した瞬間にドロップ！ 小さくなったトロールで高積みを狙おう！</p>
          <p>ステージサイズは固定。端末が変わっても落下距離は同じです。</p>
          <p>ステージの端から落ちたらゲームオーバー！</p>
          <div class="actions">
            <button id="startBtn" class="primary">スタート</button>
          </div>
        </div>
      </div>
    </section>

    <section class="footer-bar">
      <div>
        <div class="next-label">次のトロール</div>
        <div id="message" class="message">ステージ中央を狙って、押して離してドロップ！</div>
      </div>
      <div class="next-box"><img id="nextPreview" alt="next troll preview" /></div>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
