<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>トロールタワーバトル</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <section class="hud">
      <div class="title-row">
        <div class="title">トロールタワーバトル</div>
        <span id="appVersion" class="badge" aria-label="version">v0.1.1</span>
      </div>

      <button id="dropBtn" class="primary" hidden>ドロップ</button>
    </section>

    <section class="canvas-wrap">
      <canvas id="game"></canvas>
      <div class="canvas-top-hud" aria-label="ゲーム情報">
        <div class="canvas-stats">
          <div class="card"><span>積んだ数</span><strong id="stackCount">0</strong></div>
          <div class="card"><span>ベスト</span><strong id="bestCount">0</strong></div>
          <button id="restartBtn" aria-label="Reset" title="Reset">Reset</button>
        </div>
      </div>
      <div id="itemOverlay" class="item-overlay">
        <div class="next-mini-wrap" aria-label="次のトロール">
          <div class="next-mini-label">NEXT</div>
          <div class="next-mini-box"><img id="nextPreview" alt="next troll preview" /></div>
        </div>
        <button id="itemBtn" class="item-canvas-btn" disabled>🧲<span id="itemCount" class="item-badge">0</span></button>
        <div class="item-progress-ring-wrap">
          <svg class="item-progress-ring" viewBox="0 0 36 36">
            <circle class="ring-bg" cx="18" cy="18" r="15"/>
            <circle id="itemProgressRing" class="ring-fill" cx="18" cy="18" r="15" stroke-dasharray="0 94.25"/>
          </svg>
        </div>
      </div>
      <div class="canvas-rotate-controls" aria-label="回転操作">
        <button id="rotateLeftCanvasBtn" type="button" aria-label="左回転"><span>↺</span></button>
        <button id="rotateRightCanvasBtn" type="button" aria-label="右回転"><span>↻</span></button>
      </div>
      <div id="overlay" class="overlay show">
        <div class="dialog">
          <h2>準備OK？</h2>
          <p>ステージにトロールを落として、どれだけたくさん積めるか挑戦！</p>
          <p>落とす前は左右移動に加えて回転もできます。ゲーム画面を押して、離した瞬間にドロップ！</p>
          <p>だんだんプルプルしてくるトロール達をうまくコントロールしよう。</p>
          <p>ステージからトロールが落下するとゲームオーバーです。</p>
          <div class="actions">
            <button id="startBtn" class="primary">スタート</button>
          </div>
        </div>
      </div>
    </section>
    <div id="message" class="sr-only" aria-live="polite">ステージ中央を狙って、押して離してドロップ！</div>
  </div>

  <script src="game.js"></script>
</body>
</html>
